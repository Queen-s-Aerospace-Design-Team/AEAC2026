#Add ros2 google_drive script 
#Allow environment variables to be duplicated

x-shared-env: &shared-env
  NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
  # Set only if ROS participants need to use one domain
  # ROS_DOMAIN_ID: "42"
  # ROS_AUTOMATIC_DISCOVERY_RANGE: SUBNET

name: qadt-deployment

services:
  deploy:
    image: ghcr.io/queen-s-aerospace-design-team/deployment-px4:latest
    pull_policy: missing
    container_name: qadt-deployment

    init: true
    restart: unless-stopped
    stop_grace_period: 20s
    working_dir: /home/qadt-deployment/AEAC2026/ros_ws
    network_mode: host
    privileged: true
    gpus: all
    runtime: nvidia
    shm_size: "2g" # Helpful for camera / vision workloads

    volumes:
      # ZED X and ZED X Mini on Jetson
      - "/dev:/dev"
      - "/tmp:/tmp"
      - "/var/nvidia/nvcam/settings:/var/nvidia/nvcam/settings"
      - "/etc/systemd/system/zed_x_daemon.service:/etc/systemd/system/zed_x_daemon.service:ro"

    environment: 
      <<: *shared-env
      # other environment variables

    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
      source /home/qadt-deployment/AEAC2026/ros_ws/install/setup.bash &&
      ros2 run flight_missions orbit_location &&
      ros2 run google_drive drive_uploader"