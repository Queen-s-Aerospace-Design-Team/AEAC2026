# This is the common file for the different services

name: qadt-deployment-base

services:
  base:
    image: ghcr.io/queen-s-aerospace-design-team/deployment-px4:latest
    pull_policy: missing
    init: true
    restart: on-failure
    stop_grace_period: 20s
    working_dir: /home/qadt-deploy/AEAC2026/ros_ws
    network_mode: host

  # GPU to be used in perception workflows
  base_with_gpu:
    extends:
      service: base

    gpus: all
    runtime: nvidia
    shm_size: "2g" # Helpful for camera / vision workloads

# Set only if ROS participants need to use one domain
# environment:
#   ROS_DOMAIN_ID: "42"
#   ROS_AUTOMATIC_DISCOVERY_RANGE: SUBNET
# Optional:
#   ROS_LOCALHOST_ONLY: "1"